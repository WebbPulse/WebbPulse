# Builds a Docker image, pushes it to ECR, and triggers an App Runner deployment.
# AWS resources (ECR, App Runner, IAM, etc.) must already exist in Terraform state.
#
# Ordering guarantee: the image build runs immediately (no conflict with Terraform), but
# before touching App Runner the job waits for any active HCP Terraform run on the
# WebbPulse workspace to reach a terminal state. This prevents the
# OPERATION_IN_PROGRESS error that occurs when Terraform updates App Runner config
# at the same time as a deployment.
#
# Concurrency: only one deploy runs at a time. A second push queues rather than
# cancels, so no deploy is ever silently skipped.
#
# GitHub Actions variables required (Settings → Secrets and variables → Variables):
#   AWS_DEPLOY_ROLE_ARN      — IAM role ARN for OIDC (e.g. arn:aws:iam::ACCOUNT:role/webbpulse-production-github-actions-deploy)
#   ECR_REPOSITORY_NAME      — ECR repo name only (terraform output: webbpulse-production-backend)
#   APP_RUNNER_SERVICE_ARN   — Full App Runner service ARN (from AWS console or aws apprunner list-services)
#
# GitHub Actions secrets required (Settings → Secrets and variables → Secrets):
#   TFC_API_TOKEN            — HCP Terraform user/team token (for workspace polling)
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: us-west-2
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TFC_ORG: WebbPulseTerraform
      TFC_WORKSPACE: WebbPulse

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push runs in parallel with any active Terraform run — ECR is
      # independent of App Runner state.
      - name: Build and push image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Wait for HCP Terraform to finish before touching App Runner.
      # Polls every 15 s for up to 10 min (40 attempts).
      - name: Wait for Terraform run to complete
        env:
          TFC_API_TOKEN: ${{ secrets.TFC_API_TOKEN }}
        run: |
          TFC_WORKSPACE_ID=$(curl -sfg \
            -H "Authorization: Bearer $TFC_API_TOKEN" \
            -H "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/$TFC_ORG/workspaces/$TFC_WORKSPACE" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['data']['id'])")
          echo "Resolved workspace ID: $TFC_WORKSPACE_ID"

          TERMINAL="applied planned_and_finished discarded errored canceled force_canceled"
          echo "Polling HCP Terraform workspace $TFC_WORKSPACE for active runs..."
          for i in $(seq 1 40); do
            RESPONSE=$(curl -sfg \
              -H "Authorization: Bearer $TFC_API_TOKEN" \
              -H "Content-Type: application/vnd.api+json" \
              "https://app.terraform.io/api/v2/workspaces/$TFC_WORKSPACE_ID/runs?page[size]=1")
            STATUS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          runs = json.load(sys.stdin).get('data', [])
          print(runs[0]['attributes']['status'] if runs else 'no_runs')
          ")
            echo "  Attempt $i/40 — Terraform run status: $STATUS"
            if echo "$TERMINAL" | grep -qw "$STATUS" || [ "$STATUS" = "no_runs" ]; then
              echo "Terraform is idle. Proceeding."
              break
            fi
            if [ "$i" -eq 40 ]; then
              echo "Timed out waiting for Terraform (last status: $STATUS)."
              exit 1
            fi
            sleep 15
          done

      # Secondary guard: wait for App Runner itself to reach RUNNING (handles any
      # residual in-progress state, e.g. a prior deployment finishing up).
      - name: Wait for App Runner service to be ready
        env:
          APP_RUNNER_SERVICE_ARN: ${{ vars.APP_RUNNER_SERVICE_ARN }}
        run: |
          echo "Waiting for App Runner service to reach RUNNING state..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --query 'Service.Status' --output text)
            echo "  Attempt $i/30 — App Runner status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Service is ready."
              exit 0
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for App Runner (last status: $STATUS)."
              exit 1
            fi
            sleep 20
          done

      - name: Deploy to App Runner
        env:
          APP_RUNNER_SERVICE_ARN: ${{ vars.APP_RUNNER_SERVICE_ARN }}
        run: |
          aws apprunner start-deployment --service-arn "$APP_RUNNER_SERVICE_ARN"
